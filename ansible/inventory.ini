# ============================================
# INVENTAIRE ANSIBLE
# ============================================
# Liste des serveurs et leurs paramètres de connexion

[webservers]
# Remplacez VOTRE_IP_PUBLIQUE par l'IP de votre instance EC2
ec2-api ansible_host=54.88.192.206

[webservers:vars]
# Variables communes à tous les serveurs du groupe [webservers]
ansible_user=ec2-user
ansible_ssh_private_key_file=tp-api-keypair.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 -o ConnectionAttempts=2 -o ServerAliveInterval=15 -o ServerAliveCountMax=2'
ansible_ssh_timeout=20
# StrictHostKeyChecking=no évite le prompt de confirmation SSH
# En production, on préférerait vérifier les fingerprints
name: CD - Déploiement AWS

on:
  # Se déclenche après la réussite du workflow CI
  workflow_run:
    workflows: ["CI - Tests"]
    types:
      - completed
    branches: [ main ]

jobs:
  # ============================================
  # JOB 1 : Déployer sur EC2
  # ============================================
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Déployer sur EC2

    # Ne s'exécute que si le CI a réussi
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production

    steps:
      # Étape 1 : Récupérer le code source
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # Étape 2 : Installer la clé SSH
      - name: 🔑 Configurer la clé SSH
        run: |
          # Créer le dossier SSH
          mkdir -p ~/.ssh
          
          # Écrire la clé privée dans un fichier
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          
          # Sécuriser les permissions (obligatoire pour SSH)
          chmod 600 ~/.ssh/ec2_key
          
          # Ajouter le serveur EC2 aux hôtes connus
          # (évite le prompt "Are you sure you want to continue connecting?")
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # Étape 3 : Copier les fichiers vers EC2
      - name: 📦 Transférer les fichiers vers EC2
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'coverage' \
            --exclude '__tests__' \
            -e "ssh -i ~/.ssh/ec2_key" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/
          # rsync copie uniquement les fichiers modifiés (différentiel)
          # --delete supprime les fichiers distants qui n'existent plus localement
          # --exclude évite de copier les fichiers inutiles en production

      # Étape 4 : Installer les dépendances et redémarrer
      - name: 🔄 Installer et redémarrer l'application
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            cd /home/ec2-user/app
            
            echo "📦 Installation des dépendances de production..."
            npm install --omit=dev
            
            echo "🔄 Redémarrage de l'application avec PM2..."
            pm2 delete tp-api || true
            pm2 start ecosystem.config.js --env production
            
            echo "⏳ Attente du démarrage (3 secondes)..."
            sleep 3
            
            echo "✅ Statut PM2 :"
            pm2 status
            
            echo "📋 Dernières lignes de log :"
            pm2 describe tp-api
          ENDSSH

      # Étape 5 : Vérifier que l'API répond
      - name: 🏥 Health check
        run: |
          echo "🔍 Vérification que l'API répond..."
          
          # Attendre jusqu'à 30 secondes que l'API soit prête
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.EC2_HOST }}:3000/ || echo "000")
            
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "✅ API accessible ! (HTTP $HTTP_STATUS)"
              exit 0
            fi
            
            echo "⏳ Tentative $i/10 — HTTP $HTTP_STATUS — nouvelle tentative dans 3s..."
            sleep 3
          done
          
          echo "❌ L'API ne répond pas après 30 secondes"
          exit 1

      # Étape 6 : Nettoyer la clé SSH
      - name: 🧹 Nettoyage
        if: always()
        run: |
          rm -f ~/.ssh/ec2_key
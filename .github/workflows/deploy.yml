name: CD - Déploiement AWS (Ansible)

on:
  workflow_run:
    workflows: ["CI - Tests"]
    types:
      - completed
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Déployer avec Ansible

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment:
      name: production

    steps:
      # Étape 1 : Récupérer le code source
      - name: 📥 Checkout du code
        uses: actions/checkout@v4

      # Étape 2 : Installer Ansible
      - name: 🤖 Installer Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          ansible --version

      # Étape 3 : Configurer SSH
      - name: 🔑 Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # Étape 4 : Générer l'inventaire dynamique
      - name: 📋 Générer l'inventaire Ansible
        run: |
          cat > ansible/inventory-ci.ini << EOF
          [webservers]
          ec2-api ansible_host=${{ secrets.EC2_HOST }}

          [webservers:vars]
          ansible_user=${{ secrets.EC2_USER }}
          ansible_ssh_private_key_file=~/.ssh/ec2_key
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

      # Étape 5 : Tester la connexion
      - name: 🏓 Tester la connexion Ansible
        run: |
          cd ansible
          ansible webservers -i inventory-ci.ini -m ping

      # Étape 6 : Lancer le déploiement
      - name: 🚀 Déployer avec Ansible
        run: |
          cd ansible
          ansible-playbook -i inventory-ci.ini playbook-deploy.yml \
            -e "github_repo=https://github.com/${{ github.repository }}.git" \
            -e "github_branch=${{ github.ref_name }}"
        # -e passe des variables extra au playbook
        # Cela surcharge les variables définies dans le playbook

      # Étape 7 : Health check final
      - name: 🏥 Health check depuis l'extérieur
        run: |
          echo "🔍 Vérification externe de l'API..."
          for i in {1..10}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ secrets.EC2_HOST }}:3000/ || echo "000")

            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 500 ]; then
              echo "✅ API accessible depuis Internet ! (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "⏳ Tentative $i/10 — HTTP $HTTP_STATUS — nouvelle tentative dans 3s..."
            sleep 3
          done

          echo "❌ L'API ne répond pas depuis l'extérieur"
          exit 1

      # Étape 8 : Nettoyage
      - name: 🧹 Nettoyage
        if: always()
        run: |
          rm -f ~/.ssh/ec2_key
          rm -f ansible/inventory-ci.ini